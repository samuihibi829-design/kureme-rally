services:
  - type: web
    name: proposal-builder
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: MOCK_CLAUDE
        value: "false"
      - key: PORT
        value: "3001"
      - key: BASIC_AUTH_USER
        sync: false
      - key: BASIC_AUTH_PASS
        sync: false
